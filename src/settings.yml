      - "Diskret: diskret"
      - "Normal: normal"
      - "Volle Bandbreite: voll"
    default: "voll"
  - keyname: bild_basis_url
    field_type: url
    name: Bild-Basis-URL
    description: Basis-URL, unter dem die Igel-Bilder liegen (mit Slash am Ende). Leer lassen für die per GitHub Pages gehosteten Standardbilder.
    placeholder: https://shostakovich.github.io/hedgehog-fit/assets/uebungen/
    optional: true
  - keyname: anrede
    field_type: select
    name: Anrede
    description: Wie der Igel dich anspricht
    options:
      - Neutral
      - Weiblich
      - Männlich
    default: neutral
